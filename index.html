<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Wedding Day — Alma & Andri</title>
<meta name="description" content="Undangan Pernikahan Alma & Andri — 8 Agustus 2026">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     TOKENS
     ============================================================ */
  :root{
    --cream:#F5F1E9;
    --ink:#1B1815;
    --black:#0F0E0C;
    --clay:#B97A56;
    --line: rgba(27,24,21,0.12);
    --white:#FFFFFF;

    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Jost', sans-serif;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-body);
    max-width: 520px;
    margin: 0 auto;
    overflow-x:hidden;
    position:relative;
  }
  img{display:block; width:100%; height:auto;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}

  .reveal{opacity:0; transform:translateY(24px); transition:opacity .8s ease, transform .8s ease;}
  .reveal.in-view{opacity:1; transform:translateY(0);}

  @media (prefers-reduced-motion: reduce){
    .reveal{transition:none; opacity:1; transform:none;}
    html{scroll-behavior:auto;}
  }

  /* generic full-width banner slot — dipakai di hampir semua section
     karena teks & foto sudah kamu desain jadi satu gambar */
  .banner-slot{ width:100%; line-height:0; background: var(--cream-2, #EFE9DD); }
  .banner-slot img{ width:100%; height:auto; }

  /* ============================================================
     1) GREETING (dinamis, bukan bagian dari banner)
     ============================================================ */
  .hero-greet{
    padding: 22px 24px;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
    background: var(--black);
    color: var(--cream);
  }
  #greetName{ font-weight:600; }

  /* ============================================================
     3) TAB ANDRI / ALMA — hanya switch gambar banner
     ============================================================ */
  .tabs-bar{
    display:flex;
    justify-content:center;
    gap:28px;
    padding: 24px 24px 20px;
  }
  .tab{
    font-family: var(--font-display);
    font-size:24px;
    font-style: italic;
    color: rgba(27,24,21,.35);
    padding-bottom:8px;
    position:relative;
    transition: color .3s ease;
  }
  .tab.active{ color: var(--ink); font-weight:600; }
  .tab.active::after{
    content:'';
    position:absolute;
    left:0; right:0; bottom:-1px;
    height:2px;
    background: var(--clay);
  }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  /* ============================================================
     4) COUNTDOWN — banner jadi background, angka & tombol overlay
     ============================================================ */
  .countdown-section{
    position:relative;
    width:100%;
  }
  .countdown-section img{ width:100%; height:auto; display:block; }
  .countdown-overlay{
    position:absolute;
    top: 8%;
    left:0; right:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  .countdown{
    display:flex;
    gap:8px;
  }
  .cd-box{
    background: rgba(255,255,255,.92);
    border-radius: 6px;
    width: 58px;
    padding: 10px 0 8px;
    text-align:center;
    box-shadow: 0 4px 14px rgba(0,0,0,.15);
  }
  .cd-box span{
    display:block;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight:600;
    color: var(--ink);
  }
  .cd-box label{
    display:block;
    font-size:9px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color: rgba(27,24,21,.55);
    margin-top:2px;
  }
  .remind-btn{
    display:inline-block;
    padding: 11px 26px;
    background: rgba(255,255,255,.95);
    border-radius: 999px;
    font-size: 11px;
    letter-spacing:.15em;
    text-transform:uppercase;
    color: var(--ink);
    box-shadow: 0 4px 14px rgba(0,0,0,.15);
  }
  .remind-btn:active{ background: var(--ink); color: var(--cream); }

  /* fallback jika belum upload banner countdown: tetap tampil di atas cream */
  .countdown-fallback-bg{
    background: var(--cream);
    padding: 36px 0 30px;
    position:static;
  }
  .countdown-fallback-bg .countdown-overlay{ position:static; }
.maps-btn-wrap{
    display:flex;
    justify-content:center;
    padding: 18px 24px 30px;
    background: var(--cream);
  }
  .maps-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background: var(--white);
    padding: 13px 24px;
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(0,0,0,.12);
    font-size: 14px;
    font-weight:500;
    color: var(--ink);
  }
  .maps-btn:active{ box-shadow: 0 2px 8px rgba(0,0,0,.12); }

  /* ============================================================
     6) GALLERY / COLLAGE — tetap foto individual (bukan banner)
     ============================================================ */
  .gallery-section{ padding: 40px 0; }
  .gallery-heading{
    text-align:center;
    font-family: var(--font-display);
    font-style:italic;
    font-size:22px;
    margin-bottom:20px;
  }
  .gallery-hero{ width:100%; aspect-ratio: 3/3.6; cursor:pointer; }
  .gallery-hero img{ height:100%; object-fit:cover; }
  .gallery-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:3px;
    margin-top:3px;
  }
  .gallery-grid img{
    aspect-ratio: 1/1.15;
    height:100%;
    object-fit:cover;
    cursor:pointer;
  }

  .footer-space{ height: 30px; background:var(--cream); }

  /* ============================================================
     LIGHTBOX
     ============================================================ */
  .lightbox{
    position:fixed; inset:0;
    background: rgba(10,9,8,.96);
    z-index: 999;
    display:none;
    align-items:center;
    justify-content:center;
    touch-action: pan-y;
  }
  .lightbox.open{ display:flex; }
  .lb-track{ display:flex; width:100%; height:100%; transition: transform .35s ease; }
  .lb-slide{ min-width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:20px; }
  .lb-slide img{ width:auto; height:auto; max-width:100%; max-height:100%; object-fit:contain; }
  .lb-close{ position:absolute; top:18px; right:18px; color:#fff; font-size:30px; line-height:1; z-index:1001; width:40px; height:40px; }
  .lb-arrow{ position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:24px; width:42px; height:42px; display:flex; align-items:center; justify-content:center; z-index:1001; opacity:.8; }
  .lb-prev{ left:4px; }
  .lb-next{ right:4px; }
  .lb-counter{ position:absolute; bottom:22px; left:0; right:0; text-align:center; color:rgba(255,255,255,.7); font-size:12px; letter-spacing:.1em; }
</style>
</head>
<body>

  <!-- ============================================================
       GREETING — dinamis, bukan gambar. Diisi otomatis dari
       Google Sheet berdasarkan ?to=KODE di URL
       ============================================================ -->
  <p class="hero-greet">Hi, <span id="greetName">Tamu Undangan</span></p>

  <!-- ============================================================
       1) HERO BANNER — judul, tanggal, nama pengantin sudah
       kamu desain di dalam gambar ini. Ganti: images/hero-banner.jpg
       ============================================================ -->
 <div class="banner-slot reveal">
    <img src="images/hero-banner.jpg" alt="Akad Nikah Alma & Andri">
  </div>

  <div class="maps-btn-wrap reveal">
    <a class="maps-btn" id="mapsBtn" href="#" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C7.86 2 4.5 5.36 4.5 9.5C4.5 15.15 12 22 12 22C12 22 19.5 15.15 19.5 9.5C19.5 5.36 16.14 2 12 2Z" fill="#C0442E"/>
        <circle cx="12" cy="9.5" r="3" fill="#FFFFFF"/>
      </svg>
      <span>Maps Lokasi Akad</span>
    </a>
  </div>

  <!-- ============================================================
       2) QUOTE BANNER — ayat + foto sudah jadi satu gambar
       Ganti: images/quote-banner.jpg
       ============================================================ -->
  <div class="banner-slot reveal">
    <img src="images/quote-banner.jpg" alt="Surat Ar-Rum ayat 21">
  </div>

  <!-- ============================================================
       3) TAB ANDRI / ALMA — nama & data orang tua sudah didesain
       di dalam banner masing-masing. Ganti:
       images/banner-andri.jpg dan images/banner-alma.jpg
       ============================================================ -->
  <section class="reveal">
    <div class="tabs-bar">
      <button class="tab active" data-tab="andri">Andri</button>
      <button class="tab" data-tab="alma">Alma</button>
    </div>

    <div class="tab-panel active banner-slot" id="panel-andri">
      <img src="images/banner-andri.jpg" alt="Andri">
    </div>
    <div class="tab-panel banner-slot" id="panel-alma">
      <img src="images/banner-alma.jpg" alt="Alma">
    </div>
  </section>

  <!-- ============================================================
       4) COUNTDOWN + INGATKAN SAYA
       Banner: images/countdown-banner.jpg (foto latar, kamu desain)
       Angka countdown & tombol otomatis tampil DI ATAS banner ini.
       Kalau posisi angka/tombol perlu digeser, ubah nilai "top" pada
       class .countdown-overlay di bagian <style> di atas.
       ============================================================ -->
  <section class="countdown-section reveal">
    <img src="images/countdown-banner.jpg" alt="">
    <div class="countdown-overlay">
      <div class="countdown">
        <div class="cd-box"><span id="cd-days">00</span><label>Hari</label></div>
        <div class="cd-box"><span id="cd-hours">00</span><label>Jam</label></div>
        <div class="cd-box"><span id="cd-mins">00</span><label>Menit</label></div>
        <div class="cd-box"><span id="cd-secs">00</span><label>Detik</label></div>
      </div>
      <button class="remind-btn" id="remindBtn">Ingatkan Saya</button>
    </div>
  </section>

  <!-- ============================================================
       5) AKAD NIKAH + LOKASI — semua teks & foto sudah jadi satu
       banner. Ganti: images/akad-banner.jpg
       ============================================================ -->
  <div class="banner-slot reveal">
    <img src="images/akad-banner.jpg" alt="Akad Nikah Alma & Andri">
  </div>

  <!-- ============================================================
       6) GALLERY — klik foto manapun untuk buka popup + swipe.
       Ini TETAP foto individual (bukan 1 banner), supaya bisa
       jadi collage & di-klik satu-satu. Atur daftarnya di bagian
       CONFIG.GALLERY pada kode JavaScript di bawah.
       ============================================================ -->
  <section class="gallery-section reveal">
    <div class="gallery-heading">Our Moments</div>
    <div class="gallery-hero" data-lb="0">
      <img src="images/gallery-01.jpg" alt="">
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <!-- ============================================================
       7) CLOSING BANNER — ucapan terima kasih & foto sudah jadi
       satu gambar utuh. Ganti: images/closing-banner.jpg
       ============================================================ -->
  <div class="banner-slot reveal">
    <img src="images/closing-banner.jpg" alt="Terima kasih">
  </div>

  <div class="footer-space"></div>

  <!-- ============================================================
       LIGHTBOX (popup galeri, bisa swipe kiri/kanan)
       ============================================================ -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&times;</button>
    <button class="lb-arrow lb-prev" id="lbPrev">&#10094;</button>
    <div class="lb-track" id="lbTrack"></div>
    <button class="lb-arrow lb-next" id="lbNext">&#10095;</button>
    <div class="lb-counter" id="lbCounter"></div>
  </div>

<script>
/* ============================================================
   KONFIGURASI — bagian yang paling sering kamu ubah
   ============================================================ */
const CONFIG = {
  // Link CSV dari Google Sheet ("Publish to web" > CSV).
  // Format sheet: kolom A = code, kolom B = name
  SHEET_CSV_URL: "GANTI_DENGAN_LINK_CSV_GOOGLE_SHEET_KAMU",

  // Target waktu acara (untuk countdown & calendar) — WIB (UTC+7)
  EVENT_DATE_ISO: "2026-08-08T09:00:00+07:00",
  EVENT_DURATION_HOURS: 2,

  // Isi tombol "Ingatkan Saya" -> Google Calendar
  CALENDAR_TITLE: "Akad Nikah Alma & Andri",
  CALENDAR_LOCATION: "NUU JII RESTO, Jl. Rancasawo Blk. H No.100, Margasari, Kec. Buahbatu, Kota Bandung, Jawa Barat 40286",
  CALENDAR_DETAILS: "Merupakan sebuah kehormatan dan kebahagiaan bagi kami jika Bapak/Ibu/Saudara/i berkenan hadir dan memberikan doa restu bagi kami. Terima kasih. - Alma & Andri",
  MAPS_QUERY: "NUU JII RESTO, Jl. Rancasawo Blk. H No.100, Margasari, Kec. Buahbatu, Kota Bandung, Jawa Barat 40286",

  // Daftar foto galeri (foto individual, dipakai untuk collage + popup)
  GALLERY: [
    "images/gallery-01.jpg",
    "images/gallery-02.jpg",
    "images/gallery-03.jpg",
    "images/gallery-04.jpg",
    "images/gallery-05.jpg",
    "images/gallery-06.jpg",
    "images/gallery-07.jpg",
    "images/gallery-08.jpg",
    "images/gallery-09.jpg",
    "images/gallery-10.jpg"
  ]
};

/* ============================================================
   1) SAPAAN NAMA OTOMATIS (dari Google Sheet via URL ?to=KODE)
   ============================================================ */
(async function greetGuest(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('to');
  const nameEl = document.getElementById('greetName');
  if(!code){ return; }

  try{
    const res = await fetch(CONFIG.SHEET_CSV_URL, { cache: "no-store" });
    const csv = await res.text();
    const rows = csv.split(/\r?\n/).map(r => r.split(','));
    for(const row of rows){
      const rowCode = (row[0] || "").trim().replace(/^"|"$/g,'');
      const rowName = (row[1] || "").trim().replace(/^"|"$/g,'');
      if(rowCode && rowCode.toLowerCase() === code.toLowerCase()){
        nameEl.textContent = rowName || "Tamu Undangan";
        document.title = `Undangan untuk ${rowName} — Alma & Andri`;
        return;
      }
    }
  }catch(e){
    console.warn("Gagal ambil data tamu:", e);
  }
})();

/* ============================================================
   2) SCROLL REVEAL
   ============================================================ */
document.getElementById('mapsBtn').href =
  'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(CONFIG.MAPS_QUERY);
const revealEls = document.querySelectorAll('.reveal');
const io = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('in-view');
      io.unobserve(entry.target);
    }
  });
},{ threshold: 0.12 });
revealEls.forEach(el=>io.observe(el));

/* ============================================================
   3) TABS ANDRI / ALMA
   ============================================================ */
const tabs = document.querySelectorAll('.tab');
tabs.forEach(tab=>{
  tab.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

/* ============================================================
   4) COUNTDOWN
   ============================================================ */
const targetDate = new Date(CONFIG.EVENT_DATE_ISO).getTime();
function updateCountdown(){
  const now = Date.now();
  let diff = targetDate - now;
  if(diff < 0) diff = 0;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const mins = Math.floor((diff / (1000*60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);

  document.getElementById('cd-days').textContent = String(days).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(mins).padStart(2,'0');
  document.getElementById('cd-secs').textContent = String(secs).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

/* ============================================================
   5) INGATKAN SAYA -> Google Calendar
   ============================================================ */
function toICSFormat(date){
  return date.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
}
function escapeICSText(text){
  return text.replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
document.getElementById('remindBtn').addEventListener('click', ()=>{
  const start = new Date(CONFIG.EVENT_DATE_ISO);
  const end = new Date(start.getTime() + CONFIG.EVENT_DURATION_HOURS*60*60*1000);

  const icsLines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Alma Andri Wedding//ID',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:' + Date.now() + '-alma-andri-wedding',
    'DTSTAMP:' + toICSFormat(new Date()),
    'DTSTART:' + toICSFormat(start),
    'DTEND:' + toICSFormat(end),
    'SUMMARY:' + escapeICSText(CONFIG.CALENDAR_TITLE),
    'LOCATION:' + escapeICSText(CONFIG.CALENDAR_LOCATION),
    'DESCRIPTION:' + escapeICSText(CONFIG.CALENDAR_DETAILS),
    'END:VEVENT',
    'END:VCALENDAR'
  ];
  const icsContent = icsLines.join('\r\n');

  const dataUri = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(icsContent);
  const link = document.createElement('a');
  link.href = dataUri;
  link.download = 'akad-nikah-alma-andri.ics';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

/* ============================================================
   6) GALLERY + LIGHTBOX (swipeable, tanpa perlu klik close)
   ============================================================ */
const galleryGrid = document.getElementById('galleryGrid');
const galleryHero = document.querySelector('.gallery-hero img');
if(CONFIG.GALLERY.length){
  galleryHero.src = CONFIG.GALLERY[0];
  CONFIG.GALLERY.slice(1).forEach((src, i)=>{
    const div = document.createElement('div');
    div.dataset.lb = i + 1;
    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    div.appendChild(img);
    galleryGrid.appendChild(div);
  });
}

const lightbox = document.getElementById('lightbox');
const lbTrack = document.getElementById('lbTrack');
const lbCounter = document.getElementById('lbCounter');
let currentIndex = 0;

CONFIG.GALLERY.forEach(src=>{
  const slide = document.createElement('div');
  slide.className = 'lb-slide';
  const img = document.createElement('img');
  img.src = src;
  img.alt = '';
  slide.appendChild(img);
  lbTrack.appendChild(slide);
});

function openLightbox(index){
  currentIndex = index;
  updateLightboxPosition(false);
  lightbox.classList.add('open');
}
function closeLightbox(){
  lightbox.classList.remove('open');
}
function updateLightboxPosition(animate=true){
  lbTrack.style.transition = animate ? 'transform .35s ease' : 'none';
  lbTrack.style.transform = `translateX(-${currentIndex * 100}%)`;
  lbCounter.textContent = `${currentIndex + 1} / ${CONFIG.GALLERY.length}`;
}
function nextSlide(){
  currentIndex = Math.min(currentIndex + 1, CONFIG.GALLERY.length - 1);
  updateLightboxPosition();
}
function prevSlide(){
  currentIndex = Math.max(currentIndex - 1, 0);
  updateLightboxPosition();
}

document.querySelectorAll('[data-lb]').forEach(el=>{
  el.addEventListener('click', ()=> openLightbox(parseInt(el.dataset.lb, 10)));
});
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbNext').addEventListener('click', nextSlide);
document.getElementById('lbPrev').addEventListener('click', prevSlide);
lightbox.addEventListener('click', (e)=>{ if(e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', (e)=>{
  if(!lightbox.classList.contains('open')) return;
  if(e.key === 'ArrowRight') nextSlide();
  if(e.key === 'ArrowLeft') prevSlide();
  if(e.key === 'Escape') closeLightbox();
});

// swipe kiri/kanan di mobile — tanpa perlu tombol close
let touchStartX = 0, touchDeltaX = 0, touching = false;
lbTrack.addEventListener('touchstart', (e)=>{
  touching = true;
  touchStartX = e.touches[0].clientX;
  lbTrack.style.transition = 'none';
}, { passive:true });

lbTrack.addEventListener('touchmove', (e)=>{
  if(!touching) return;
  touchDeltaX = e.touches[0].clientX - touchStartX;
  const basePercent = -currentIndex * 100;
  const dragPercent = (touchDeltaX / window.innerWidth) * 100;
  lbTrack.style.transform = `translateX(${basePercent + dragPercent}%)`;
}, { passive:true });

lbTrack.addEventListener('touchend', ()=>{
  touching = false;
  if(touchDeltaX < -50) nextSlide();
  else if(touchDeltaX > 50) prevSlide();
  else updateLightboxPosition();
  touchDeltaX = 0;
});
</script>
</body>
</html>
